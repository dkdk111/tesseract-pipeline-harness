name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run test suite (standard library only)
        run: python -m unittest discover -s tests -v
      - name: Run the demo end to end (no keys)
        run: python -m tesseract_pipeline demo
      - name: Run the full demo gallery
        run: python -m tesseract_pipeline gallery
      - name: Infer a structure from a free-form goal
        run: python -m tesseract_pipeline think --file examples/07_freeform_inference/goal.txt
      - name: Verify the committed example still opens all four axes
        run: python -m tesseract_pipeline render examples/01_market_brief/tesseract.json
